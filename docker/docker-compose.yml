services:

  jme-pcs-db:
    image: postgres:18.2-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=jme-pcs-db
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]

  ############################################
  # First Kafka Cluster ("cluster1")
  ############################################

  cluster1-broker:
    image: confluentinc/cp-kafka:8.2.0
    hostname: cluster1-broker
    ports:
      - "10000:10000"
    volumes:
      - ./kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf
    environment:
      # KRaft mode settings
      KAFKA_BROKER_ID: 1
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@cluster1-broker:29093'
      # KRaft cluster ID - format properly, a 22-character base64-encoded string, for the confluent platform
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://cluster1-broker:9092,SASL_PLAINTEXT://localhost:10000
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,SASL_PLAINTEXT://0.0.0.0:10000,CONTROLLER://0.0.0.0:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Authentication
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf"
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-512
      # Temporary storage settings
      KAFKA_LOG_DIRS: /tmp/kafka-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  cluster1-broker_init:
    image: confluentinc/cp-kafka:8.2.0
    depends_on:
      - cluster1-broker
    entrypoint:
      - /bin/bash
      - -exc
      - kafka-configs --bootstrap-server cluster1-broker:9092 --alter --add-config 'SCRAM-SHA-512=[password=user-secret]' --entity-type users --entity-name user

  cluster1-schema-registry:
    image: confluentinc/cp-schema-registry:8.1.1
    depends_on:
      - cluster1-broker
      - cluster1-broker_init
    ports:
      - "11000:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: cluster1-schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://cluster1-broker:9092

  ############################################
  # Second Kafka Cluster ("cluster2")
  ############################################

  cluster2-broker:
    image: confluentinc/cp-kafka:8.2.0
    ports:
      - "12000:12000"
    volumes:
      - ./kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf
    environment:
      # KRaft mode settings
      KAFKA_BROKER_ID: 1
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@cluster2-broker:29093'
      # KRaft cluster ID - format properly, a 22-character base64-encoded string, for the confluent platform
      CLUSTER_ID: 'tJ0L35z8SwumO0qs_lEWEw'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://cluster2-broker:9092,SASL_PLAINTEXT://localhost:12000
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,SASL_PLAINTEXT://0.0.0.0:12000,CONTROLLER://0.0.0.0:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Authentication
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf"
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-512
      # Temporary storage settings
      KAFKA_LOG_DIRS: /tmp/kafka-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  cluster2-broker_init:
    image: confluentinc/cp-kafka:8.2.0
    depends_on:
      - cluster2-broker
    entrypoint:
      - /bin/bash
      - -exc
      - kafka-configs --bootstrap-server cluster2-broker:9092 --alter --add-config 'SCRAM-SHA-512=[password=cluster2-secret]' --entity-type users --entity-name cluster2-user

  cluster2-schema-registry:
    image: confluentinc/cp-schema-registry:8.1.1
    depends_on:
      - cluster2-broker
      - cluster2-broker_init
    ports:
      - "13000:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: cluster2-schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://cluster2-broker:9092

  ############################################
  # S3 Object Storage
  ############################################
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    hostname: minio
    tmpfs:
      - /data
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: local
      MINIO_ROOT_PASSWORD: localsecret
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5
    command: server /data

  minio_init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: minio
    entrypoint:
      - /bin/sh
      - -exc
      - |
        mc alias set minio http://minio:9000 local localsecret
        mc mb --ignore-existing minio/jme-processcontext-obs
        mc ls minio/jme-processcontext-obs
        tail -f /dev/null
