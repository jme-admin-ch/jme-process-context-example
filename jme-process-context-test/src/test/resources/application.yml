spring:
  application:
    name: jme-pcs-it
  main:
    banner-mode: off
  docker:
    compose:
      enabled: true
      file: ../docker/docker-compose.yml
      lifecycle-management: start-and-stop
      skip:
        in-tests: false
      arguments:
        - "--project-name=${COMPOSE_PROJECT_NAME:jme-pcs-it}"
      readiness:
        timeout: 60s
